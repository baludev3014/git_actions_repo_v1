name: CI/CD workflow using github actions

on:
  push:
    branches:
      - main
    

jobs:

  app_testing:

    runs-on: ubuntu-latest

    steps:

      - name: checkout repo
        uses: actions/checkout@v5

      - name: testing the app
        run: npm run test 
  
  building_artifact:

    runs-on: ubuntu-latest
    
    needs: 
      - app_testing

    steps:
      - name: logging msg into console
        run: echo "App Testing Passed successfully and started building the image." 


  building_docker_image:

    runs-on: ubuntu-latest
    needs: 
      - building_artifact

    steps:

      - name: checkout git repo 
        uses: actions/checkout@v5

      - name: Installing docker 
        run: |
          sudo apt update -y
          sudo apt install ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc
          sudo tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF

          sudo apt update -y

      - name: Installing docker tools
        run: sudo apt install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
      
      - name: building the docker image
        run: docker build -t pradeep3014/git_actions_repo_v1:latest .

      - name: Logging into dockerhub
        run: echo ${{ secrets.DOCKER_ACCESS_TOKEN }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: pushing into docker hub
        run: docker push pradeep3014/git_actions_repo_v1:latest  

  final_stage:

    runs-on: ubuntu-latest
    
    needs:
      - building_docker_image
    steps:
      - name: displaying message
        run: echo "All steps are done" 




